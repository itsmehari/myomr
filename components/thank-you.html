<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Successful</title>
    <style>
        body { text-align: center; padding: 50px; font-family: Arial, sans-serif; }
        h1 { color: #4B1E83; }
        p { font-size: 18px; }
        a { text-decoration: none; color: #FF5722; font-weight: bold; }
    </style>
    <script>
        function goBack() {
            if (document.referrer) {
                window.location.href = document.referrer; // Redirects back to the last visited page
            } else {
                window.location.href = "https://myomr.in/"; // Fallback to homepage if no referrer is found
            }
        }
    </script>
</head>
<body>
    <h1>Thank You for Subscribing!</h1>
    <p>We've added you to our mailing list.</p>
    <p><a href="#" onclick="goBack()">Go Back to Last Page</a></p>
</body>
</html>
