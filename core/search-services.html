<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search & Services Section</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="search-services">
        <div class="search-bar">
            <input type="text" placeholder="Chennai" class="location">
            <input type="text" placeholder="Search for Packers and Movers" class="search-input">
            <button class="search-button">🔍</button>
        </div>
        
        <div class="banner-slider">
            <div class="banner">
                <img src="A_modern_web_banner_for_an_online_travel_booking_s.png" alt="Lowest Airfares">
                <div class="banner-text">
                    <h2>Time to fly at <strong>Lowest Airfares</strong></h2>
                    <button class="book-now">Book Now</button>
                </div>
            </div>
        </div>
        
        <div class="services-list">
            <div class="service-card b2b">
                <h3>B2B</h3>
                <p>Quick Quotes</p>
            </div>
            <div class="service-card repairs">
                <h3>REPAIRS & SERVICES</h3>
                <p>Get Nearest Vendor</p>
            </div>
            <div class="service-card real-estate">
                <h3>REAL ESTATE</h3>
                <p>Finest Agents</p>
            </div>
            <div class="service-card doctors">
                <h3>DOCTORS</h3>
                <p>Book Now</p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
